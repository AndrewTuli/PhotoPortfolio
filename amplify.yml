version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 18 && nvm use 18
        - npm install
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: build
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
  customRules:
    - source: '</^[^.]+$|\.(?!(css|gif|ico|jpg|js|png|svg|woff|woff2|ttf|json)$)([^.]+$)/>'
      target: /index.html
      status: '200'
